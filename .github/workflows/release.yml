name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm pack:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            deploy/desktop/release/Mirscope-Setup-*.exe
            deploy/desktop/release/Mirscope-*-portable-win.zip

  build-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: git archive --format=zip -o Mirscope-${{ github.ref_name }}-source.zip HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: Mirscope-${{ github.ref_name }}-source.zip

  release:
    needs: [build-windows, build-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/*
            artifacts/source-zip/*
          generate_release_notes: true
          body: |
            ## Mirscope ${{ github.ref_name }}

            Local First AI Prompt 全景分析平台（全身镜）

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | **Mirscope-Setup-*.exe** | Windows 安装包 |
            | **Mirscope-*-portable-win.zip** | 便携版（解压后运行 `Mirscope.exe`，无需安装） |
            | **Mirscope-*-source.zip** | 源码包（开发者） |

            ### 便携版使用

            1. 下载 `Mirscope-*-portable-win.zip` 并解压
            2. 进入解压目录，双击 `Mirscope.exe`

            ### 安装版使用

            1. 下载 `Mirscope-Setup-*.exe` 并安装
            2. 从开始菜单或桌面快捷方式启动

            ### 从源码运行

            ```bash
            pnpm install
            pnpm dev
            ```

            ### 链接

            - 介绍页：https://mrsongzhaoyang.github.io/Mirscope/
            - 文档：README.md

            ### License

            MIT
